<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FUTURE SHOOTERS</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
        body { background:#000; overflow:hidden; touch-action:none; font-family:'Courier New',Courier,monospace; }
        canvas { display:block; position:absolute; top:0; left:0; }
        #hud { pointer-events:none; z-index:1; }

        .screen {
            position:absolute; top:0; left:0; width:100%; height:100%;
            display:none; align-items:center; justify-content:center;
            flex-direction:column; z-index:2;
            background:rgba(0,0,8,0.93); color:#0ff;
        }
        .screen.active { display:flex; }

        /* ── Connecting ── */
        #scr-connect h2 { font-size:clamp(18px,3vw,30px); letter-spacing:6px; margin-bottom:20px; }
        .spinner {
            width:48px; height:48px; border:3px solid rgba(0,255,255,0.2);
            border-top-color:#0ff; border-radius:50%;
            animation:spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Waiting ── */
        #scr-wait h2 { font-size:clamp(22px,4vw,44px); letter-spacing:6px; margin-bottom:12px; }
        #scr-wait .badge {
            font-size:clamp(14px,2.2vw,20px); letter-spacing:3px;
            padding:10px 28px; border:1px solid; margin-bottom:36px;
        }
        #scr-wait .invite-label { font-size:12px; color:#556; letter-spacing:2px; margin-bottom:8px; }
        #scr-wait .invite-url {
            font-size:clamp(11px,1.6vw,15px); color:#88aaff; letter-spacing:1px;
            padding:10px 20px; border:1px solid #223366;
            background:rgba(0,30,80,0.4); margin-bottom:14px;
            max-width:90vw; word-break:break-all; text-align:center;
        }
        #copy-btn {
            padding:10px 32px; font-size:14px; letter-spacing:3px;
            font-family:'Courier New',monospace;
            background:transparent; border:1px solid #0cf; color:#0cf;
            cursor:pointer; margin-bottom:30px; transition:all 0.15s;
        }
        #copy-btn:hover  { background:#0cf; color:#000; }
        #copy-btn.copied { border-color:#0f8; color:#0f8; }
        #scr-wait .hint { font-size:12px; color:#445; letter-spacing:1px; }
        .pulse { animation:pulse 1.6s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

        /* ── Game Over ── */
        #scr-gameover h2 { font-size:clamp(32px,7vw,80px); letter-spacing:6px; margin-bottom:16px; text-shadow:0 0 30px currentColor; }
        #scr-gameover .scores { font-size:clamp(14px,2vw,22px); color:#ccc; margin-bottom:36px; letter-spacing:2px; }
        #scr-gameover .restart-hint { font-size:13px; color:#556; letter-spacing:3px; }
        #scr-gameover .wait-restart { font-size:14px; color:#668; letter-spacing:2px; margin-top:10px; display:none; }

        /* ── Full ── */
        #scr-full h2 { font-size:clamp(22px,4vw,44px); letter-spacing:4px; color:#f44; margin-bottom:12px; }
        #scr-full p { font-size:14px; color:#888; }
    </style>
</head>
<body>

<canvas id="game"></canvas>
<canvas id="hud"></canvas>

<div id="scr-connect" class="screen active">
    <h2>CONNECTING...</h2>
    <div class="spinner"></div>
</div>

<div id="scr-wait" class="screen">
    <h2 class="pulse">WAITING FOR OPPONENT</h2>
    <div id="wait-badge" class="badge">YOU ARE PLAYER 1</div>
    <p class="invite-label">SHARE THIS LINK WITH YOUR OPPONENT</p>
    <div id="invite-url" class="invite-url"></div>
    <button id="copy-btn" onclick="copyInvite()">COPY LINK</button>
    <p class="hint">You can look around while you wait</p>
</div>

<div id="scr-gameover" class="screen">
    <h2 id="go-title"></h2>
    <p class="scores" id="go-scores"></p>
    <p class="restart-hint" id="go-restart-hint"></p>
    <p class="wait-restart" id="go-wait-restart">Waiting for opponent to request restart...</p>
</div>

<div id="scr-full" class="screen">
    <h2>GAME FULL</h2>
    <p>Both player slots are taken. Try again later.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ============================================================
//  FUTURE SHOOTERS — Online 2-Player FPS
//  Each player connects from their own device.
//  First to connect = Player 1 (Blue)
//  Second to connect = Player 2 (Orange)
// ============================================================

// ── Constants ─────────────────────────────────────────────
const ARENA_HALF  = 14;
const EYE_HEIGHT  = 1.6;
const MOVE_SPEED  = 5.2;
const TURN_SPEED  = 1.9;
const PITCH_SPEED = 1.6;
const MAX_PITCH   = Math.PI / 2.3;
const PLAYER_R    = 0.38;
const MAX_HP      = 100;
const BULLET_DMG  = 25;
const KILL_LIMIT  = 10;
const NET_HZ      = 20;     // state send rate
const LERP        = 0.22;   // opponent interpolation

// Player configs
const PLAYER_CFG = [
    { bodyColor: 0x0055aa, glowColor: 0x00ddff, cssColor: '#00aaff', label: 'PLAYER 1',
      spawn: { pos: [-11, 0, 0], yaw: -Math.PI / 2 } },
    { bodyColor: 0x882200, glowColor: 0xff8833, cssColor: '#ff6600', label: 'PLAYER 2',
      spawn: { pos: [ 11, 0, 0], yaw:  Math.PI / 2 } },
];

// ── Canvas / Renderer ─────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
const gameCanvas = document.getElementById('game');
const hudCanvas  = document.getElementById('hud');
const hud        = hudCanvas.getContext('2d');
gameCanvas.width = hudCanvas.width  = W;
gameCanvas.height= hudCanvas.height = H;

const renderer = new THREE.WebGLRenderer({ canvas: gameCanvas, antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

// ── Camera (single – my view) ─────────────────────────────
const cam = new THREE.PerspectiveCamera(78, W / H, 0.05, 80);

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08000f);
scene.fog = new THREE.FogExp2(0x08000f, 0.038);

// ── Lighting ──────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x18102a, 3));

const sun = new THREE.DirectionalLight(0x8080ff, 1.2);
sun.position.set(0, 18, 0); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
Object.assign(sun.shadow.camera, { near:1, far:50, left:-18, right:18, top:18, bottom:-18 });
scene.add(sun);

const fillP1 = new THREE.PointLight(0x0044cc, 2.5, 22, 2); fillP1.position.set(-11,3,0); scene.add(fillP1);
const fillP2 = new THREE.PointLight(0xcc3300, 2.5, 22, 2); fillP2.position.set( 11,3,0); scene.add(fillP2);

const atmosLights = [
    [0x4400cc,[-11,-12]], [0x00cc88,[11,12]], [0xff0066,[-11,12]], [0x0088ff,[11,-12]]
].map(([color,[x,z]]) => {
    const l = new THREE.PointLight(color, 1.4, 7);
    l.position.set(x, 0.4, z); scene.add(l); return l;
});

const muzzleLight = new THREE.PointLight(0xffffff, 0, 6); scene.add(muzzleLight);

// ── Arena ─────────────────────────────────────────────────
const bulletCollidables = [];
const moveCollidables   = [];

function addBox(w, h, d, x, y, z, mat, isWall = false) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z); m.castShadow = m.receiveShadow = true;
    scene.add(m); bulletCollidables.push(m);
    if (!isWall) moveCollidables.push(m);
    return m;
}

const matFloor   = new THREE.MeshLambertMaterial({ color:0x0d0d20 });
const matCeil    = new THREE.MeshLambertMaterial({ color:0x06060f });
const matWall    = new THREE.MeshLambertMaterial({ color:0x18184a, emissive:0x05053a, emissiveIntensity:0.6 });
const matCover   = new THREE.MeshLambertMaterial({ color:0x251550, emissive:0x0a0330, emissiveIntensity:0.5 });
const matBarrier = new THREE.MeshLambertMaterial({ color:0x142040, emissive:0x050e22, emissiveIntensity:0.5 });
const matGlow    = new THREE.MeshBasicMaterial({ color:0x5511cc });
const matGlowR   = new THREE.MeshBasicMaterial({ color:0xcc2200 });
const matGlowC   = new THREE.MeshBasicMaterial({ color:0x00ccaa });
const matTrim    = new THREE.MeshBasicMaterial({ color:0x220044 });

// Floor
const floorM = new THREE.Mesh(new THREE.PlaneGeometry(ARENA_HALF*2, ARENA_HALF*2), matFloor);
floorM.rotation.x = -Math.PI/2; floorM.receiveShadow = true; scene.add(floorM);
const grid = new THREE.GridHelper(ARENA_HALF*2, ARENA_HALF*2, 0x000844, 0x000422);
grid.position.y = 0.01; scene.add(grid);

// Ceiling
const ceilM = new THREE.Mesh(new THREE.PlaneGeometry(ARENA_HALF*2, ARENA_HALF*2), matCeil);
ceilM.rotation.x = Math.PI/2; ceilM.position.y = 6; scene.add(ceilM);

// Ceiling strips
[-6,-2,2,6].forEach(x => {
    const s = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.05,ARENA_HALF*2), new THREE.MeshBasicMaterial({color:0x221133}));
    s.position.set(x,5.95,0); scene.add(s);
});

// Walls
const WK = ARENA_HALF * 2;
addBox(WK+1.6,6,0.8,  0, 3, -ARENA_HALF-0.4, matWall, true);
addBox(WK+1.6,6,0.8,  0, 3,  ARENA_HALF+0.4, matWall, true);
addBox(0.8,6,WK,     -ARENA_HALF-0.4, 3, 0,  matWall, true);
addBox(0.8,6,WK,      ARENA_HALF+0.4, 3, 0,  matWall, true);

// Wall trim
[-ARENA_HALF, ARENA_HALF].forEach(z => {
    [0.8, 4.8].forEach(y => { const t=new THREE.Mesh(new THREE.BoxGeometry(WK,0.12,0.05),matTrim); t.position.set(0,y,z); scene.add(t); });
});
[-ARENA_HALF, ARENA_HALF].forEach(x => {
    [0.8, 4.8].forEach(y => { const t=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.12,WK),matTrim); t.position.set(x,y,0); scene.add(t); });
});

// Central pillar
addBox(2.2,5.5,2.2, 0,2.75,0, matCover);
[1.2,2.8,4.2].forEach(y => { const r=new THREE.Mesh(new THREE.BoxGeometry(2.5,0.12,2.5),matGlow); r.position.set(0,y,0); scene.add(r); });

// Barriers
addBox(4.5,2.2,0.85, -6,1.1, 0, matBarrier);
addBox(4.5,2.2,0.85,  6,1.1, 0, matBarrier);
addBox(0.85,2.2,4.5,  0,1.1,-6, matBarrier);
addBox(0.85,2.2,4.5,  0,1.1, 6, matBarrier);

// Corner crates
[[-9,1,-9],[9,1,-9],[-9,1,9],[9,1,9]].forEach(([x,y,z]) => {
    addBox(2.2,2.2,2.2, x,y,z, matCover);
    const top=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.12,2.4),matGlowR); top.position.set(x,2.2,z); scene.add(top);
});

// L-shape covers
addBox(3.2,2.2,0.85, -9.5,1.1,-4, matBarrier); addBox(0.85,2.2,2.2, -8,1.1,-3.2, matBarrier);
addBox(3.2,2.2,0.85,  9.5,1.1, 4, matBarrier); addBox(0.85,2.2,2.2,  8,1.1, 3.2, matBarrier);

// Scatter boxes
addBox(1.4,1.4,1.4, -4,0.7, 9, matCover); addBox(1.4,1.4,1.4,  4,0.7,-9, matCover);
addBox(1.4,1.4,1.4, -4,0.7,-9, matCover); addBox(1.4,1.4,1.4,  4,0.7, 9, matCover);

// Barrier glow tops
scene.children.filter(c => c.isMesh && c.material === matBarrier).forEach(b => {
    const p = b.geometry.parameters;
    const s = new THREE.Mesh(new THREE.BoxGeometry(p.width+0.05,0.08,p.depth+0.05), matGlowC);
    s.position.set(b.position.x, b.position.y+p.height/2+0.04, b.position.z); scene.add(s);
});

// ── Effects ───────────────────────────────────────────────
const tracers = [], sparks = [];

function spawnTracer(from, to, color) {
    const geo = new THREE.BufferGeometry().setFromPoints([from.clone(), to.clone()]);
    const mat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.9 });
    const line= new THREE.Line(geo, mat);
    scene.add(line);
    tracers.push({ line, life:0.11, maxLife:0.11 });
}

function spawnSparks(pos, count, color) {
    for (let i=0; i<count; i++) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.045,4,4), new THREE.MeshBasicMaterial({color,transparent:true}));
        m.position.copy(pos); scene.add(m);
        sparks.push({ mesh:m, life:0.45, maxLife:0.45,
            vel: new THREE.Vector3((Math.random()-.5)*6, Math.random()*5+0.5, (Math.random()-.5)*6) });
    }
}

// ── Player Mesh Builder ───────────────────────────────────
function buildPlayerMesh(layer, bodyColor, glowColor) {
    const root      = new THREE.Group();
    const headPivot = new THREE.Group();
    headPivot.position.y = 1.65;

    function addPart(geo, color, parent) {
        const m = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color}));
        m.castShadow = true;
        (parent || root).add(m);
        return m;
    }

    addPart(new THREE.BoxGeometry(0.22,0.72,0.24), bodyColor).position.set(-0.14,0.36,0);
    addPart(new THREE.BoxGeometry(0.22,0.72,0.24), bodyColor).position.set( 0.14,0.36,0);
    addPart(new THREE.BoxGeometry(0.62,0.80,0.36), bodyColor).position.set(0,1.10,0);
    addPart(new THREE.BoxGeometry(0.18,0.68,0.22), bodyColor).position.set(-0.48,1.08,0);
    addPart(new THREE.BoxGeometry(0.18,0.68,0.22), bodyColor).position.set( 0.48,1.08,0);
    addPart(new THREE.BoxGeometry(0.42,0.42,0.38), bodyColor, headPivot);
    const visor = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.12,0.04), new THREE.MeshBasicMaterial({color:glowColor}));
    visor.position.set(0,0,-0.2); headPivot.add(visor);
    root.add(headPivot);

    function setLayer(obj) { obj.layers.set(layer); obj.children.forEach(setLayer); }
    setLayer(root);
    scene.add(root);
    return { root, headPivot };
}

// Build both meshes upfront (assigned to my/opp after knowing ID)
const meshData = [
    buildPlayerMesh(1, PLAYER_CFG[0].bodyColor, PLAYER_CFG[0].glowColor),
    buildPlayerMesh(2, PLAYER_CFG[1].bodyColor, PLAYER_CFG[1].glowColor),
];
meshData.forEach(d => { d.root.visible = false; }); // hidden until game starts

// ── Game State ────────────────────────────────────────────
let myId       = -1;     // 0 or 1, assigned by server
let myMesh     = null;   // my player mesh (hidden from my cam)
let myHead     = null;
let oppMesh    = null;   // opponent mesh
let oppHead    = null;

// Local player state
const myPos   = new THREE.Vector3();
let   myYaw   = 0, myPitch = 0;
let   myHp    = MAX_HP, myKills = 0;
let   myAlive = true, myRespawnTimer = 0;
let   myShootCD = 0, myShootFlash = 0, myHitFlash = 0, myHitMarker = 0;

// Opponent state (from network)
const oppRenderPos   = new THREE.Vector3();
const oppNetPos      = new THREE.Vector3();
let   oppRenderYaw   = 0, oppNetYaw   = 0;
let   oppRenderPitch = 0, oppNetPitch = 0;
let   oppHp          = MAX_HP, oppKills = 0;
let   oppAlive       = true;

// Screen state
let gameState = 'connecting'; // connecting | waiting | playing | gameover

const killFeed = [];

function copyInvite() {
    const url = document.getElementById('invite-url').textContent;
    const btn = document.getElementById('copy-btn');
    navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPY LINK'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
        // Fallback for older browsers / non-https
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPY LINK'; btn.classList.remove('copied'); }, 2000);
    });
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (id) document.getElementById(id).classList.add('active');
}

function initAsPlayer(id, serverHp, serverKills) {
    myId = id;
    const cfg    = PLAYER_CFG[id];
    const oppId  = id ^ 1;
    const oppCfg = PLAYER_CFG[oppId];

    // Assign meshes
    myMesh  = meshData[id].root;
    myHead  = meshData[id].headPivot;
    oppMesh = meshData[oppId].root;
    oppHead = meshData[oppId].headPivot;

    // Camera layers: hide my own body
    cam.layers.enableAll();
    cam.layers.disable(id + 1);

    // Set spawn positions
    const sp  = cfg.spawn;
    const osp = oppCfg.spawn;
    myPos.set(...sp.pos); myYaw = sp.yaw; myPitch = 0;
    oppRenderPos.set(...osp.pos); oppNetPos.set(...osp.pos);
    oppRenderYaw = oppNetYaw = osp.yaw;

    // Server-provided state (in case reconnecting mid-game)
    myHp    = serverHp[id];    myKills    = serverKills[id];
    oppHp   = serverHp[oppId]; oppKills   = serverKills[oppId];

    // Waiting screen
    const badge = document.getElementById('wait-badge');
    badge.textContent = `YOU ARE ${cfg.label}`;
    badge.style.color       = cfg.cssColor;
    badge.style.borderColor = cfg.cssColor;
    document.getElementById('invite-url').textContent = window.location.href;

    syncMyPlayer();
    myMesh.visible = true;
    gameState = 'waiting';
}

function startPlaying() {
    gameState = 'playing';
    oppMesh.visible = true;
    oppRenderPos.copy(oppNetPos);
    showScreen(null); // hide all overlays
    killFeed.length = 0;
}

// ── Collision ─────────────────────────────────────────────
function collidesMove(pos) {
    for (const box of moveCollidables) {
        const p  = box.geometry.parameters;
        const hw = p.width/2 + PLAYER_R, hd = p.depth/2 + PLAYER_R;
        if (Math.abs(pos.x - box.position.x) < hw && Math.abs(pos.z - box.position.z) < hd) return true;
    }
    return false;
}

// ── PeerJS Networking (no server required) ────────────────
const joinPeerId = new URLSearchParams(location.search).get('p');
const isHost     = !joinPeerId;
let   dataConn   = null;

if (!isHost) document.querySelector('#scr-connect h2').textContent = 'JOINING GAME...';

function sendMsg(data) {
    if (dataConn && dataConn.open) dataConn.send(data);
}

function handleMsg(msg) {
    switch (msg.type) {

        case 'state':
            oppNetPos.set(msg.pos.x, msg.pos.y, msg.pos.z);
            oppNetYaw   = msg.yaw;
            oppNetPitch = msg.pitch;
            break;

        case 'shoot_effect': {
            const from = oppRenderPos.clone(); from.y += EYE_HEIGHT;
            spawnTracer(from,
                new THREE.Vector3(msg.hitPos.x, msg.hitPos.y, msg.hitPos.z),
                myId === 0 ? 0xff8844 : 0x44eeff);
            break;
        }

        case 'shoot_hit':
            if (!myAlive) break;
            myHp = Math.max(0, myHp - BULLET_DMG);
            myHitFlash = 0.2;
            if (myHp === 0) {
                myAlive = false; myMesh.visible = false;
                oppKills++;
                killFeed.push({ text:`${PLAYER_CFG[myId^1].label} eliminated YOU`,
                    color:PLAYER_CFG[myId^1].cssColor, life:3.5 });
                sendMsg({ type:'died' });
                setTimeout(() => {
                    if (gameState !== 'gameover') {
                        myHp = MAX_HP; myAlive = true;
                        const sp = PLAYER_CFG[myId].spawn;
                        myPos.set(...sp.pos); myYaw = sp.yaw; myPitch = 0;
                        syncMyPlayer(); myMesh.visible = true;
                        sendMsg({ type:'respawned' });
                    }
                }, 3000);
            }
            break;

        case 'died':
            myKills++; oppHp = 0; oppAlive = false;
            if (oppMesh) oppMesh.visible = false;
            killFeed.push({ text:`YOU eliminated ${PLAYER_CFG[myId^1].label}`,
                color:PLAYER_CFG[myId].cssColor, life:3.5 });
            if (myKills >= KILL_LIMIT) {
                showGameOver(myId);
                sendMsg({ type:'game_over', winnerId:myId });
            }
            break;

        case 'respawned':
            oppAlive = true; oppHp = MAX_HP;
            { const osp = PLAYER_CFG[myId^1].spawn;
              oppNetPos.set(...osp.pos); oppNetYaw = osp.yaw; oppNetPitch = 0; }
            if (oppMesh) oppMesh.visible = true;
            break;

        case 'game_over':
            showGameOver(msg.winnerId);
            break;

        case 'restart':
            doRestart();
            break;
    }
}

function showGameOver(winnerId) {
    if (gameState === 'gameover') return;
    gameState = 'gameover';
    const won    = winnerId === myId;
    const myCfg  = PLAYER_CFG[myId];
    const oppCfg = PLAYER_CFG[myId^1];
    const title  = document.getElementById('go-title');
    title.textContent = won ? 'YOU WIN!' : 'YOU LOSE';
    title.style.color = won ? myCfg.cssColor : oppCfg.cssColor;
    document.getElementById('go-scores').textContent =
        `${myCfg.label}: ${myKills}   |   ${oppCfg.label}: ${oppKills}`;
    document.getElementById('go-restart-hint').textContent = 'Press R to play again';
    showScreen('scr-gameover');
}

function doRestart() {
    myHp = MAX_HP; myKills = 0; myAlive = true;
    myShootCD = 0; myHitFlash = 0; myShootFlash = 0; myHitMarker = 0;
    oppHp = MAX_HP; oppKills = 0; oppAlive = true;
    const sp  = PLAYER_CFG[myId].spawn;
    const osp = PLAYER_CFG[myId^1].spawn;
    myPos.set(...sp.pos); myYaw = sp.yaw; myPitch = 0;
    oppNetPos.set(...osp.pos); oppRenderPos.copy(oppNetPos);
    oppNetYaw = osp.yaw; oppRenderYaw = osp.yaw; oppNetPitch = 0;
    myMesh.visible = oppMesh.visible = true;
    syncMyPlayer();
    gameState = 'playing'; killFeed.length = 0;
    showScreen(null);
}

function setupConn(conn) {
    dataConn = conn;
    conn.on('open', () => { startPlaying(); });
    conn.on('data', msg => { handleMsg(typeof msg === 'string' ? JSON.parse(msg) : msg); });
    conn.on('close', () => {
        if (gameState === 'playing') {
            if (oppMesh) oppMesh.visible = false;
            gameState = 'waiting';
            if (isHost) {
                // Regenerate a fresh invite link
                const joinUrl = `${location.href.split('?')[0]}?p=${peer.id}`;
                document.getElementById('invite-url').textContent = joinUrl;
                showScreen('scr-wait');
            } else {
                location.replace(location.pathname); // drop ?p= and reload
            }
        }
    });
    conn.on('error', err => console.warn('conn error', err));
}

const peer = new Peer(undefined, { debug: 0 });

peer.on('open', peerId => {
    if (isHost) {
        initAsPlayer(0, [MAX_HP,MAX_HP], [0,0]);
        const joinUrl = `${location.href.split('?')[0]}?p=${peerId}`;
        document.getElementById('invite-url').textContent = joinUrl;
        showScreen('scr-wait');
    } else {
        initAsPlayer(1, [MAX_HP,MAX_HP], [0,0]);
        const conn = peer.connect(joinPeerId, { reliable:true, serialization:'json' });
        setupConn(conn);
    }
});

peer.on('connection', conn => { setupConn(conn); }); // P1 receives P2

peer.on('error', err => {
    const h2 = document.querySelector('#scr-connect h2');
    if (err.type === 'peer-unavailable') {
        h2.textContent = 'HOST NOT FOUND';
        h2.style.color = '#f44';
        document.querySelector('#scr-connect .spinner').style.display = 'none';
    } else {
        h2.textContent = 'CONNECTION ERROR';
        h2.style.color = '#f44';
    }
    showScreen('scr-connect');
});

// State send loop (20 Hz)
setInterval(() => {
    if (dataConn && dataConn.open && myId >= 0 && gameState === 'playing') {
        sendMsg({ type:'state', pos:{x:myPos.x,y:myPos.y,z:myPos.z}, yaw:myYaw, pitch:myPitch });
    }
}, 1000 / NET_HZ);

// ── Input ─────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if ([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
    keys[k] = true;

    if (k === 'r' && gameState === 'gameover') {
        sendMsg({ type:'restart' });
        doRestart();
    }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ── Shooting ──────────────────────────────────────────────
const raycaster = new THREE.Raycaster();

function shoot() {
    myShootCD    = 0.28;
    myShootFlash = 0.08;
    muzzleLight.position.copy(cam.position);
    muzzleLight.intensity = 10;

    raycaster.setFromCamera(new THREE.Vector2(0,0), cam);
    raycaster.far = 65;

    const envHits  = raycaster.intersectObjects(bulletCollidables, true);
    const envDist  = envHits.length ? envHits[0].distance : 65;
    let   hitPoint = raycaster.ray.at(Math.min(envDist, 35), new THREE.Vector3());
    let   didHit   = false;

    if (oppAlive) {
        const pHits = raycaster.intersectObjects([oppMesh], true);
        if (pHits.length && pHits[0].distance < envDist) {
            hitPoint = pHits[0].point.clone();
            didHit   = true;
            spawnSparks(hitPoint, 8, PLAYER_CFG[myId].glowColor);
            sendMsg({ type:'shoot_hit' });
        }
    }

    sendMsg({ type:'shoot_effect', hit:didHit, hitPos:{x:hitPoint.x,y:hitPoint.y,z:hitPoint.z} });

    const ts = cam.position.clone(); ts.y -= 0.08;
    spawnTracer(ts, hitPoint, PLAYER_CFG[myId].glowColor);
    myHitMarker = didHit ? 0.28 : 0;
}

// ── Sync helpers ──────────────────────────────────────────
function syncMyPlayer() {
    cam.position.set(myPos.x, myPos.y + EYE_HEIGHT, myPos.z);
    cam.rotation.set(myPitch, myYaw, 0, 'YXZ');
    if (myMesh) {
        myMesh.position.set(myPos.x, myPos.y, myPos.z);
        myMesh.rotation.y = myYaw;
        if (myHead) myHead.rotation.x = myPitch;
    }
}

function shortestYaw(from, to) {
    let d = to - from;
    while (d >  Math.PI) d -= Math.PI*2;
    while (d < -Math.PI) d += Math.PI*2;
    return d;
}

// ── Update ────────────────────────────────────────────────
let lastTime = 0;

function update(dt) {
    // Effects
    for (let i=tracers.length-1; i>=0; i--) {
        const t=tracers[i]; t.life-=dt;
        t.line.material.opacity = t.life/t.maxLife*0.9;
        if (t.life<=0) { scene.remove(t.line); t.line.geometry.dispose(); tracers.splice(i,1); }
    }
    for (let i=sparks.length-1; i>=0; i--) {
        const s=sparks[i]; s.life-=dt;
        s.mesh.position.addScaledVector(s.vel, dt); s.vel.y -= 9.5*dt;
        s.mesh.material.opacity = s.life/s.maxLife;
        if (s.life<=0) { scene.remove(s.mesh); sparks.splice(i,1); }
    }
    if (muzzleLight.intensity > 0) muzzleLight.intensity = Math.max(0, muzzleLight.intensity - 50*dt);
    for (let i=killFeed.length-1; i>=0; i--) { killFeed[i].life-=dt; if(killFeed[i].life<=0) killFeed.splice(i,1); }
    atmosLights.forEach((l,i) => { l.intensity = 1.4 + Math.sin(performance.now()*0.002 + i*2.3)*0.55; });

    applyTouchKeys();

    if (!myAlive || gameState !== 'playing') return;

    // Timers
    if (myShootCD   > 0) myShootCD   -= dt;
    if (myShootFlash> 0) myShootFlash-= dt;
    if (myHitFlash  > 0) myHitFlash  -= dt;
    if (myHitMarker > 0) myHitMarker -= dt;

    // Rotate
    if (keys['q']) myYaw += TURN_SPEED*dt;
    if (keys['e']) myYaw -= TURN_SPEED*dt;
    if (keys['r']) myPitch = Math.min( MAX_PITCH, myPitch+PITCH_SPEED*dt);
    if (keys['f']) myPitch = Math.max(-MAX_PITCH, myPitch-PITCH_SPEED*dt);

    // Move
    const fx=-Math.sin(myYaw), fz=-Math.cos(myYaw);
    const rx= Math.cos(myYaw), rz=-Math.sin(myYaw);
    let mx=0, mz=0;
    if (keys['w']) { mx+=fx; mz+=fz; }
    if (keys['s']) { mx-=fx; mz-=fz; }
    if (keys['a']) { mx-=rx; mz-=rz; }
    if (keys['d']) { mx+=rx; mz+=rz; }
    const len=Math.sqrt(mx*mx+mz*mz);
    if (len>0.001) { mx=(mx/len)*MOVE_SPEED*dt; mz=(mz/len)*MOVE_SPEED*dt; }

    const tryX=myPos.clone(); tryX.x+=mx;
    tryX.x=Math.max(-ARENA_HALF+PLAYER_R, Math.min(ARENA_HALF-PLAYER_R, tryX.x));
    if (!collidesMove(tryX)) myPos.x=tryX.x;

    const tryZ=myPos.clone(); tryZ.z+=mz;
    tryZ.z=Math.max(-ARENA_HALF+PLAYER_R, Math.min(ARENA_HALF-PLAYER_R, tryZ.z));
    if (!collidesMove(tryZ)) myPos.z=tryZ.z;

    if (keys[' '] && myShootCD<=0) shoot();

    syncMyPlayer();

    // Interpolate opponent mesh
    if (oppMesh) {
        oppRenderPos.lerp(oppNetPos, LERP);
        oppMesh.position.copy(oppRenderPos);
        oppRenderYaw   += shortestYaw(oppRenderYaw, oppNetYaw)   * LERP;
        oppRenderPitch += (oppNetPitch - oppRenderPitch)          * LERP;
        oppMesh.rotation.y = oppRenderYaw;
        if (oppHead) oppHead.rotation.x = oppRenderPitch;
    }
}

// ── HUD ───────────────────────────────────────────────────
function drawHUD() {
    hud.clearRect(0,0,W,H);
    if (gameState !== 'playing' && gameState !== 'waiting') return;

    const myCfg  = myId >= 0 ? PLAYER_CFG[myId]    : null;
    const oppCfg = myId >= 0 ? PLAYER_CFG[myId ^ 1] : null;
    if (!myCfg) return;

    // Screen flashes
    if (myHitFlash > 0) {
        hud.fillStyle=`rgba(255,0,0,${Math.min(0.55, myHitFlash*3)})`; hud.fillRect(0,0,W,H);
    }
    if (myShootFlash > 0) {
        hud.fillStyle=`rgba(255,240,180,${Math.min(0.15, myShootFlash*2)})`; hud.fillRect(0,0,W,H);
    }

    if (!myAlive) {
        hud.fillStyle='rgba(0,0,0,0.55)'; hud.fillRect(0,0,W,H);
        hud.fillStyle='#ff3322'; hud.font=`bold ${Math.round(H*0.05)}px Courier New`; hud.textAlign='center';
        hud.fillText('ELIMINATED', W/2, H/2-H*0.04);
        hud.fillStyle='#fff'; hud.font=`bold ${Math.round(H*0.08)}px Courier New`;
        hud.fillText('RESPAWNING', W/2, H/2+H*0.06);
        return;
    }

    // Crosshair
    const cx=W/2, cy=H/2, hit=myHitMarker>0;
    hud.strokeStyle = hit ? '#ff4444' : 'rgba(255,255,255,0.88)';
    hud.lineWidth   = hit ? 2.5 : 1.8;
    const arm=hit?13:9, gap=4;
    hud.beginPath();
    hud.moveTo(cx-arm-gap,cy); hud.lineTo(cx-gap,cy);
    hud.moveTo(cx+gap,cy);     hud.lineTo(cx+arm+gap,cy);
    hud.moveTo(cx,cy-arm-gap); hud.lineTo(cx,cy-gap);
    hud.moveTo(cx,cy+gap);     hud.lineTo(cx,cy+arm+gap);
    hud.stroke();
    hud.fillStyle=hit?'#ff4444':'rgba(255,255,255,0.88)';
    hud.beginPath(); hud.arc(cx,cy,1.8,0,Math.PI*2); hud.fill();

    const fs  = Math.max(11, Math.round(H*0.018));
    const barW= Math.round(W*0.22), barH=Math.round(H*0.018);
    const barX= 20, barY=H-Math.round(H*0.08);

    // My health bar
    hud.fillStyle='rgba(0,0,0,0.55)';
    hud.fillRect(barX-2, barY-Math.round(H*0.042), barW+4, Math.round(H*0.066));
    const ratio=myHp/MAX_HP;
    hud.fillStyle = ratio>0.5?'#00ee88':ratio>0.25?'#ffaa00':'#ff2200';
    hud.fillRect(barX, barY, Math.round(barW*ratio), barH);
    hud.strokeStyle='rgba(255,255,255,0.28)'; hud.lineWidth=1;
    hud.strokeRect(barX, barY, barW, barH);
    hud.fillStyle='#fff'; hud.font=`bold ${fs}px Courier New`; hud.textAlign='left';
    hud.fillText(`HP  ${myHp}`, barX, barY-5);
    hud.fillStyle=myCfg.cssColor;
    hud.font=`bold ${Math.round(fs*1.1)}px Courier New`;
    hud.fillText(myCfg.label, barX, barY-fs-8);

    // Opponent mini health (top-right)
    const oBarW=Math.round(W*0.18), oBarH=Math.round(H*0.014);
    const oBarX=W-oBarW-20, oBarY=Math.round(H*0.06);
    hud.fillStyle='rgba(0,0,0,0.55)';
    hud.fillRect(oBarX-2, oBarY-Math.round(H*0.032), oBarW+4, Math.round(H*0.056));
    const oRatio=oppHp/MAX_HP;
    hud.fillStyle = oRatio>0.5?'#00ee88':oRatio>0.25?'#ffaa00':'#ff2200';
    hud.fillRect(oBarX, oBarY, Math.round(oBarW*oRatio), oBarH);
    hud.strokeStyle='rgba(255,255,255,0.2)'; hud.lineWidth=1;
    hud.strokeRect(oBarX, oBarY, oBarW, oBarH);
    hud.fillStyle=oppCfg.cssColor; hud.font=`bold ${Math.round(fs*0.95)}px Courier New`; hud.textAlign='right';
    hud.fillText(oppCfg.label, W-20, oBarY-6);
    hud.fillStyle='#aaa';
    hud.fillText(`HP ${oppHp}`, W-20, oBarY-6-Math.round(fs*1.1));

    // Kill counter (bottom-right)
    hud.fillStyle='#ffdd00'; hud.font=`bold ${Math.round(H*0.038)}px Courier New`; hud.textAlign='right';
    hud.fillText(`${myKills}`, W-20, H-Math.round(H*0.056));
    hud.fillStyle='#888'; hud.font=`${fs}px Courier New`;
    hud.fillText(`/ ${KILL_LIMIT} kills`, W-20, H-Math.round(H*0.028));
    hud.fillStyle='#666';
    hud.fillText(`OPP: ${oppKills}`, W-20, H-Math.round(H*0.002)-fs);

    // Kill feed
    const feedFs=Math.max(11, Math.round(H*0.016));
    hud.font=`${feedFs}px Courier New`; hud.textAlign='center';
    killFeed.slice(-5).forEach((k,i) => {
        const alpha=Math.min(1,k.life/0.7);
        const c=parseInt(k.color.replace('#',''),16);
        hud.fillStyle=`rgba(${(c>>16)&255},${(c>>8)&255},${c&255},${alpha.toFixed(2)})`;
        hud.fillText(k.text, W/2, 28+i*(feedFs+6));
    });

    // Score (top-center)
    hud.fillStyle='rgba(0,0,0,0.45)'; hud.fillRect(W/2-55,4,110,28);
    hud.fillStyle=myCfg.cssColor;  hud.font=`bold ${Math.round(H*0.022)}px Courier New`; hud.textAlign='center';
    hud.fillText(`${myKills}`, W/2-20, 24);
    hud.fillStyle='#556'; hud.fillText('vs', W/2, 24);
    hud.fillStyle=oppCfg.cssColor; hud.fillText(`${oppKills}`, W/2+20, 24);

    // Controls reminder (bottom-left, faint, keyboard only)
    if (gameState === 'waiting' && !isTouchDevice) {
        hud.fillStyle='rgba(255,255,255,0.15)'; hud.font=`${Math.round(H*0.014)}px Courier New`; hud.textAlign='left';
        hud.fillText('W/S move  A/D strafe  Q/E turn  R/F look  SPACE shoot', 20, H-8);
    }

    drawJoysticks();
}

// ── Background Music ──────────────────────────────────────
const bgMusic = new Audio(
    'https://dl.dropboxusercontent.com/scl/fi/0a3oz91pp3zsnytfnu3dk/My-Song-5.m4a' +
    '?rlkey=s3ddmcld3jcs3jmbgbrq777sl'
);
bgMusic.loop   = true;
bgMusic.volume = 0.4;

let musicStarted = false;
function tryStartMusic() {
    if (musicStarted) return;
    musicStarted = true;
    bgMusic.play().catch(() => {}); // silently ignore autoplay block
}
// Start on first key press or pointer down
window.addEventListener('keydown',   tryStartMusic, { once: true });
window.addEventListener('pointerdown', tryStartMusic, { once: true });

// ── Touch Controls (iPad / mobile) ───────────────────────
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

const STICK_R = 65;   // visual + hitzone radius
const FIRE_R  = 46;   // fire button radius

function stickCenter(side) {
    return side === 'left'
        ? { x: 140,     y: H - 180 }
        : { x: W - 140, y: H - 180 };
}
function fireCenter() { return { x: W - 75, y: H - 340 }; }

const touch = {
    left:  { id:null, bx:0, by:0, nx:0, ny:0 },
    right: { id:null, bx:0, by:0, nx:0, ny:0 },
    fire:  { id:null },
};

function inZone(tx, ty, cx, cy, r) { return Math.hypot(tx-cx, ty-cy) < r; }

function onTouchStart(e) {
    e.preventDefault();
    tryStartMusic();
    for (const t of e.changedTouches) {
        const { clientX:tx, clientY:ty, identifier:id } = t;
        const lc = stickCenter('left'), rc = stickCenter('right'), fc = fireCenter();
        if (!touch.left.id  && inZone(tx,ty,lc.x,lc.y,STICK_R*1.6)) {
            touch.left  = { id, bx:tx, by:ty, nx:0, ny:0 };
        } else if (!touch.fire.id  && inZone(tx,ty,fc.x,fc.y,FIRE_R*1.4)) {
            touch.fire.id = id;
        } else if (!touch.right.id && inZone(tx,ty,rc.x,rc.y,STICK_R*1.6)) {
            touch.right = { id, bx:tx, by:ty, nx:0, ny:0 };
        }
    }
}

function onTouchMove(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const { clientX:tx, clientY:ty, identifier:id } = t;
        ['left','right'].forEach(side => {
            const s = touch[side];
            if (s.id !== id) return;
            const dx=tx-s.bx, dy=ty-s.by, dist=Math.hypot(dx,dy)||1;
            const c = Math.min(dist, STICK_R);
            s.nx = (dx/dist)*(c/STICK_R);
            s.ny = (dy/dist)*(c/STICK_R);
        });
    }
}

function onTouchEnd(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const id = t.identifier;
        if (touch.left.id  === id) { touch.left  = { id:null,bx:0,by:0,nx:0,ny:0 }; }
        if (touch.right.id === id) { touch.right = { id:null,bx:0,by:0,nx:0,ny:0 }; }
        if (touch.fire.id  === id) { touch.fire.id = null; }
    }
}

if (isTouchDevice) {
    document.body.addEventListener('touchstart',  onTouchStart, { passive:false });
    document.body.addEventListener('touchmove',   onTouchMove,  { passive:false });
    document.body.addEventListener('touchend',    onTouchEnd,   { passive:false });
    document.body.addEventListener('touchcancel', onTouchEnd,   { passive:false });
}

function applyTouchKeys() {
    if (!isTouchDevice) return;
    const dead = 0.18;
    const l = touch.left, r = touch.right;
    keys['w'] = l.id !== null && l.ny < -dead;
    keys['s'] = l.id !== null && l.ny >  dead;
    keys['a'] = l.id !== null && l.nx < -dead;
    keys['d'] = l.id !== null && l.nx >  dead;
    keys['q'] = r.id !== null && r.nx < -dead;
    keys['e'] = r.id !== null && r.nx >  dead;
    keys['r'] = r.id !== null && r.ny < -dead;
    keys['f'] = r.id !== null && r.ny >  dead;
    keys[' '] = touch.fire.id !== null;
}

function drawJoysticks() {
    if (!isTouchDevice || (gameState !== 'playing' && gameState !== 'waiting')) return;

    function drawStick(cx, cy, nx, ny, active) {
        // Outer ring
        hud.beginPath(); hud.arc(cx,cy,STICK_R,0,Math.PI*2);
        hud.fillStyle='rgba(255,255,255,0.04)'; hud.fill();
        hud.strokeStyle=active?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.18)';
        hud.lineWidth=2; hud.stroke();
        // Cross guides
        hud.strokeStyle='rgba(255,255,255,0.1)'; hud.lineWidth=1;
        hud.beginPath(); hud.moveTo(cx-STICK_R,cy); hud.lineTo(cx+STICK_R,cy);
        hud.moveTo(cx,cy-STICK_R); hud.lineTo(cx,cy+STICK_R); hud.stroke();
        // Thumb
        const tx=cx+nx*STICK_R, ty=cy+ny*STICK_R;
        hud.beginPath(); hud.arc(tx,ty,24,0,Math.PI*2);
        hud.fillStyle=active?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.22)'; hud.fill();
    }

    const lc=stickCenter('left'), rc=stickCenter('right'), fc=fireCenter();
    const lActive = touch.left.id  !== null;
    const rActive = touch.right.id !== null;
    const fActive = touch.fire.id  !== null;

    drawStick(lc.x,lc.y,touch.left.nx, touch.left.ny, lActive);
    drawStick(rc.x,rc.y,touch.right.nx,touch.right.ny,rActive);

    // Fire button
    hud.beginPath(); hud.arc(fc.x,fc.y,FIRE_R,0,Math.PI*2);
    hud.fillStyle=fActive?'rgba(255,90,0,0.75)':'rgba(255,60,0,0.28)'; hud.fill();
    hud.strokeStyle=fActive?'rgba(255,160,0,0.9)':'rgba(255,90,0,0.5)';
    hud.lineWidth=2.5; hud.stroke();
    hud.fillStyle=fActive?'#fff':'rgba(255,200,150,0.85)';
    hud.font=`bold 15px Courier New`; hud.textAlign='center';
    hud.fillText('FIRE',fc.x,fc.y+5);

    // Labels
    hud.fillStyle='rgba(255,255,255,0.18)';
    hud.font=`11px Courier New`; hud.textAlign='center';
    hud.fillText('MOVE',lc.x,lc.y+STICK_R+16);
    hud.fillText('LOOK',rc.x,rc.y+STICK_R+16);
}

// ── Render Loop ───────────────────────────────────────────
function loop(time) {
    requestAnimationFrame(loop);
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;
    update(dt);
    renderer.render(scene, cam);
    drawHUD();
}

requestAnimationFrame(loop);

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    hudCanvas.width = W; hudCanvas.height = H;
    renderer.setSize(W, H);
    cam.aspect = W / H; cam.updateProjectionMatrix();
    // Touch zones recompute from W/H on next drawJoysticks() call — no extra work needed
});
</script>
</body>
